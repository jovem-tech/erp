[program:sistema-erp-reverb]
process_name=%(program_name)s
command=/usr/bin/php /var/www/sistema-erp/backend/artisan reverb:start --host=127.0.0.1 --port=8090
directory=/var/www/sistema-erp/backend
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/sistema-erp/backend/storage/logs/reverb.log
stopwaitsecs=10
