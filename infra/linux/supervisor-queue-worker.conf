[program:sistema-erp-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=/usr/bin/php /var/www/sistema-erp/backend/artisan queue:work --sleep=3 --tries=3 --max-time=3600
directory=/var/www/sistema-erp/backend
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/sistema-erp/backend/storage/logs/queue-worker.log
stopwaitsecs=3600
