server {
    listen 80;
    server_name api.sistema-erp.local;

    root /var/www/sistema-erp/backend/public;
    index index.php index.html;

    access_log /var/www/sistema-erp/backend/storage/logs/nginx-access.log;
    error_log /var/www/sistema-erp/backend/storage/logs/nginx-error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\. {
        deny all;
    }

    # Tempo real da Central de Atendimento (Laravel Reverb, ver
    # specs/010-inbox-whatsapp-tempo-real/plan.md). Processo Reverb roda em
    # 127.0.0.1:8090 via supervisor-reverb.conf; aqui so' faz proxy WebSocket.
    location /app/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}

