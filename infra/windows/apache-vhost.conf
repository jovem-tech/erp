<VirtualHost *:80>
    ServerName api.sistema-erp.local
    DocumentRoot "C:/xampp/htdocs/sistema-erp/backend/public"

    <Directory "C:/xampp/htdocs/sistema-erp/backend/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "C:/xampp/htdocs/sistema-erp/backend/storage/logs/apache-error.log"
    CustomLog "C:/xampp/htdocs/sistema-erp/backend/storage/logs/apache-access.log" combined
</VirtualHost>

