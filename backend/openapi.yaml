    UpdateOrderStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          maxLength: 80
        observacao:
          type: string
          maxLength: 2000
          nullable: true

    CloseOrderReceipt:
      type: object
      required:
        - valor
      properties:
        valor:
          type: number
          minimum: 0.01
        classificacao_recebimento:
          type: string
          nullable: true
          enum: [baixa, adiantamento, sinal]
          description: "Default baixa. Forçado para baixa quando encerrar_como é devolvido_sem_reparo/descartado."
        forma_pagamento:
          type: string
          nullable: true
          enum: [dinheiro, cartao_credito, cartao_debito, pix, boleto, transferencia]
        data_pagamento:
          type: string
          format: date
          nullable: true
          description: "Default: data_entrega."
        observacoes:
          type: string
          maxLength: 2000
          nullable: true
        operadora_id:
          type: integer
          nullable: true
          description: "Obrigatório quando forma_pagamento contém 'cartao'. ID de financeiro_cartao_operadoras."
        bandeira_id:
          type: integer
          nullable: true
          description: ID de financeiro_cartao_bandeiras. Quando omitido, usa a taxa genérica da operadora (sem bandeira específica).
        modalidade:
          type: string
          nullable: true
          enum: [credito, debito]
          description: "Obrigatório quando forma_pagamento contém 'cartao'. Derivado de forma_pagamento se omitido."
        parcelas:
          type: integer
          nullable: true
          minimum: 1
          maximum: 99
          description: "Ignorado (forçado para 1) quando modalidade=debito."

    CloseOrderRequest:
      type: object
      required:
        - encerrar_como
        - data_entrega
      properties:
        encerrar_como:
          type: string
          maxLength: 80
          description: "Código de status com status_final=1 ativo no catálogo (ex.: entregue_reparado, devolvido_sem_reparo, descartado)."
        data_entrega:
          type: string
          format: date
        observacao:
          type: string
          maxLength: 2000
          nullable: true
        recebimentos:
          type: array
          nullable: true
          description: "Lista de recebimentos desta baixa. Cada item em cartao_credito/cartao_debito é simulado via FinanceiroCartaoService antes de qualquer gravação; a taxa apurada gera uma despesa (financeiro tipo=pagar, categoria='Taxa de cartão') e um registro em financeiro_movimentos_cartao. Se o total recebido for menor que o valor da OS (e o encerramento não for devolvido_sem_reparo/descartado), a OS vai para o status intermediário entregue_pagamento_pendente e 3 cobranças são agendadas (D+1/D+3/D+5)."
          items:
            $ref: "#/components/schemas/CloseOrderReceipt"
        notificar_cliente:
          type: boolean
          nullable: true
          description: Quando true, tenta notificar o cliente por WhatsApp agora (envio único, sem agendamento). Falha no envio não desfaz a baixa.
        agendar_retorno:
          type: boolean
          nullable: true
          description: Quando true, cria um follow-up de retorno pós-serviço (crm_followups), deduplicado por OS+data.
        retorno_data:
          type: string
          format: date
          nullable: true
          description: "Default: hoje + 180 dias."

