paths:
  /health:
    get:
      tags:
        - Health
      summary: Verificar saúde da API.
      security: []
      responses:
        "200":
          description: API e banco disponíveis.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthData"
        "503":
          $ref: "#/components/responses/ServerError"

  /auth/login:
    post:
      tags:
        - Autenticação
      summary: Autenticar usuário.
      description: Emite token Bearer e dados do usuário autenticado.
      security: []
      requestBody:
        $ref: "#/components/requestBodies/Login"
      responses:
        "200":
          description: Login efetuado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginData"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/password/forgot:
    post:
      tags:
        - Autenticação
      summary: Solicitar redefinição de senha.
      security: []
      requestBody:
        $ref: "#/components/requestBodies/ForgotPassword"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServerError"
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/password/reset:
    post:
      tags:
        - Autenticação
      summary: Redefinir senha com token.
      security: []
      requestBody:
        $ref: "#/components/requestBodies/ResetPassword"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/me:
    get:
      tags:
        - Autenticação
      summary: Obter usuário autenticado.
      responses:
        "200":
          description: Usuário, grupo, módulos e permissões efetivas.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags:
        - Autenticação
      summary: Atualizar perfil do usuário autenticado.
      requestBody:
        $ref: "#/components/requestBodies/UpdateProfile"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
