# ============================================================================
# CONFIGURAÇÃO NGINX PARA PRODUÇÃO COM HTTPS ENFORCEMENT
# ============================================================================
#
# Arquivo: /etc/nginx/sites-available/sistema-erp-api.conf
#
# Pós-instalação:
# 1. Copiar para /etc/nginx/sites-available/
# 2. ln -s /etc/nginx/sites-available/sistema-erp-api.conf /etc/nginx/sites-enabled/
# 3. nginx -t
# 4. systemctl restart nginx
#
# SSL Certificate (LetsEncrypt):
# certbot certonly --webroot -w /var/www/html -d api.example.com -d api.staging.example.com
#

# ============================================================================
# Redirecionar HTTP para HTTPS (Port 80)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    # Permitir LetsEncrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirecionar tudo mais para HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================================================
# HTTPS Server (Port 443)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    # ========================================================================
    # SSL Configuration
    # ========================================================================
    
    # SSL Certificates (Use LetsEncrypt)
    ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    # SSL Session Configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL Configuration (recommended by Mozilla)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES:!DES:!RC4:!IDEA:!SEED:!aDSS:!SRP:!PSK;
    ssl_prefer_server_ciphers on;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/api.example.com/chain.pem;

    # Resolver para OCSP
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ========================================================================
    # Security Headers
    # ========================================================================

    # Force HTTPS for all connections
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection
    add_header X-Frame-Options "SAMEORIGIN" always;

    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'" always;

    # ========================================================================
    # Root Directory
    # ========================================================================
    root /var/www/sistema-erp/backend/public;
    index index.php;

    # ========================================================================
    # Logging
    # ========================================================================
    access_log /var/log/nginx/sistema-erp-api-access.log combined buffer=32k flush=5m;
    error_log /var/log/nginx/sistema-erp-api-error.log warn;

    # ========================================================================
    # Gzip Compression
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ========================================================================
    # Client Upload Limit
    # ========================================================================
    client_max_body_size 50M;

    # ========================================================================
    # Static Files Cache
    # ========================================================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ========================================================================
    # Route Requests to Laravel
    # ========================================================================

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Main routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========================================================================
    # PHP-FPM Processing
    # ========================================================================
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param APP_ENV production;
        fastcgi_param APP_DEBUG false;

        # Include standard FastCGI parameters
        include fastcgi_params;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;

        # Buffers
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # ========================================================================
    # API Rate Limiting
    # ========================================================================
    
    # Define rate limit zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    # Apply rate limiting
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========================================================================
    # Health Check Endpoint (no logging)
    # ========================================================================
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# ============================================================================
# Staging Environment (optional)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.staging.example.com;

    # SSL configuration (same as above)
    ssl_certificate /etc/letsencrypt/live/api.staging.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.staging.example.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES:!DES:!RC4:!IDEA:!SEED:!aDSS:!SRP:!PSK;
    ssl_prefer_server_ciphers on;

    # Same headers as above
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    root /var/www/sistema-erp-staging/backend/public;
    index index.php;

    # Rest of configuration is similar to production...
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param APP_ENV staging;
        fastcgi_param APP_DEBUG false;
        include fastcgi_params;
    }
}
